# XcodeGen project spec.
# Generates SkhoFlow.xcodeproj from the Swift sources next door.
#
# Locally:  brew install xcodegen && (cd ios && xcodegen)
# CI:       handled by .github/workflows/build-ios.yml

name: SkhoFlow

options:
  bundleIdPrefix: com.skhoflow
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    TARGETED_DEVICE_FAMILY: "1,2"        # iPhone + iPad
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  SkhoFlow:
    type: application
    platform: iOS
    sources:
      - path: SkhoFlow
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: SkhoFlow/Resources
        excludes:
          - Info.plist
        optional: true
    info:
      path: SkhoFlow/Resources/Info.plist
      properties:
        CFBundleDisplayName: SkhoFlow
        CFBundleName: SkhoFlow
        CFBundleShortVersionString: "2.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIRequiresFullScreen: true
        UIBackgroundModes:
          - audio
        NSLocalNetworkUsageDescription: "SkhoFlow discovers your PC on the local network so it can stream games to your iPhone."
        NSBonjourServices:
          - "_skhoflow._tcp"
          - "_skhoflow._udp"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skhoflow.client
        INFOPLIST_KEY_CFBundleDisplayName: SkhoFlow
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "1"
        # Unsigned-build friendly: workflow overrides these with CODE_SIGNING_ALLOWED=NO
        CODE_SIGN_STYLE: Automatic
